name: 'Specific'
description: 'Run Specific CLI commands in GitHub Actions, authenticated via OIDC.'
branding:
  icon: 'box'
  color: 'purple'

inputs:
  command:
    description: 'Command to run. v1 only supports "verify".'
    required: true
  version:
    description: 'CLI version to install, or "latest".'
    required: false
    default: 'latest'
  api-url:
    description: 'Specific API base URL (override for staging/dev).'
    required: false
    default: 'https://api.prod.specific.dev'
  audience:
    description: 'OIDC audience claim requested from GitHub.'
    required: false
    default: 'specific.dev'

runs:
  using: composite
  steps:
    - name: Resolve CLI version
      id: resolve
      shell: bash
      run: |
        set -euo pipefail
        if [ "${{ inputs.version }}" = "latest" ]; then
          VERSION=$(curl -fsSL https://binaries.specific.dev/cli/latest)
        else
          VERSION="${{ inputs.version }}"
        fi
        if [ -z "$VERSION" ]; then
          echo "Error: failed to resolve CLI version" >&2
          exit 1
        fi
        echo "version=$VERSION" >> "$GITHUB_OUTPUT"

    - name: Restore CLI from cache
      id: cache
      uses: actions/cache@v4
      with:
        path: ~/.local/bin/specific
        key: specific-cli-${{ runner.os }}-${{ runner.arch }}-${{ steps.resolve.outputs.version }}

    - name: Install CLI
      if: steps.cache.outputs.cache-hit != 'true'
      shell: bash
      env:
        SPECIFIC_VERSION: ${{ steps.resolve.outputs.version }}
      run: ${{ github.action_path }}/scripts/install.sh

    - name: Add CLI to PATH
      shell: bash
      run: echo "$HOME/.local/bin" >> "$GITHUB_PATH"

    - name: Validate command
      shell: bash
      run: |
        case "${{ inputs.command }}" in
          verify) ;;
          *) echo "Error: unsupported command '${{ inputs.command }}'. v1 supports: verify" >&2; exit 1 ;;
        esac

    - name: Run verify
      if: inputs.command == 'verify'
      shell: bash
      env:
        API_URL: ${{ inputs.api-url }}
        AUDIENCE: ${{ inputs.audience }}
      run: |
        set -euo pipefail

        if [ -z "${ACTIONS_ID_TOKEN_REQUEST_URL:-}" ] || [ -z "${ACTIONS_ID_TOKEN_REQUEST_TOKEN:-}" ]; then
          echo "Error: OIDC token unavailable." >&2
          echo "Add 'permissions: { id-token: write }' to the job." >&2
          exit 1
        fi

        echo "::group::Fetching GitHub OIDC token (audience: ${AUDIENCE})"
        JWT=$(curl -fsSL \
          -H "Authorization: Bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
          -H "Accept: application/json" \
          "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=${AUDIENCE}" \
          | jq -r '.value')
        if [ -z "$JWT" ] || [ "$JWT" = "null" ]; then
          echo "::endgroup::"
          echo "Error: empty OIDC token from GitHub" >&2
          exit 1
        fi
        echo "Got token (length: ${#JWT} chars)"
        echo "Claims:"
        printf '%s' "$JWT" | python3 -c 'import sys, json, base64; p = sys.stdin.read().strip().split(".")[1]; p += "=" * (-len(p) % 4); print(json.dumps(json.loads(base64.urlsafe_b64decode(p)), indent=2))' \
          || echo "(failed to decode JWT payload)"
        echo "::endgroup::"

        URL="${API_URL}/auth/github-oidc/whoami"
        echo "::group::GET ${URL}"
        BODY_FILE=$(mktemp)
        HTTP_CODE=$(curl -sS -o "$BODY_FILE" -w '%{http_code}' \
          -H "Authorization: Bearer $JWT" \
          -H "Accept: application/json" \
          "$URL")
        echo "HTTP ${HTTP_CODE}"
        echo "Response body:"
        if ! jq . "$BODY_FILE" 2>/dev/null; then
          cat "$BODY_FILE"
          echo
        fi
        echo "::endgroup::"

        case "$HTTP_CODE" in
          2*) echo "verify OK" ;;
          *) echo "::error::whoami returned HTTP ${HTTP_CODE}"; exit 1 ;;
        esac
